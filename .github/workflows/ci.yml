name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"

jobs:
  go:
    name: Go build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race + cover)
        run: go test ./... -race -cover -covermode=atomic -coverprofile=coverage.out

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          args: --timeout=5m

  integration:
    name: Integration tests (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gpuscheduler
          POSTGRES_USER: gpuscheduler
          POSTGRES_PASSWORD: gpuscheduler
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U gpuscheduler -d gpuscheduler"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: gpuscheduler
      DB_PASSWORD: gpuscheduler
      DB_NAME: gpuscheduler
      DB_SSLMODE: disable
      DATABASE_URL: postgres://gpuscheduler:gpuscheduler@localhost:5432/gpuscheduler?sslmode=disable
      REDIS_ADDR: localhost:6379
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Run integration tests
        run: go test ./... -race -tags=integration -run Integration -count=1

  frontend:
    name: Frontend build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # npm cache is enabled only when a lockfile is present (see below);
          # setup-node's built-in cache requires a lockfile so it is omitted here
          # until web/package-lock.json is committed.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
