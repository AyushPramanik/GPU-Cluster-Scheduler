# GPU Cluster Scheduler - local/dev stack
# Brings up datastores, all four Go services, node-agent replicas,
# observability (Prometheus, Grafana, OTEL collector, Jaeger).
#
# Contract:
#   api-gateway  REST :8080   metrics :9090
#   scheduler    gRPC :50051  metrics :9091
#   node-agent   gRPC :50061  metrics :9092
#   metrics      aggregator   metrics :9093
#   DB name: gpuscheduler

name: gpu-cluster-scheduler

x-service-env: &service-env
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USER: gpuscheduler
  DB_PASSWORD: gpuscheduler
  DB_NAME: gpuscheduler
  DB_SSLMODE: disable
  DATABASE_URL: postgres://gpuscheduler:gpuscheduler@postgres:5432/gpuscheduler?sslmode=disable
  REDIS_ADDR: redis:6379
  REDIS_URL: redis://redis:6379/0
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  LOG_LEVEL: info

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gpuscheduler
      POSTGRES_USER: gpuscheduler
      POSTGRES_PASSWORD: gpuscheduler
    volumes:
      - pgdata:/var/lib/postgresql/data
      # SQL files here run once on first init (idempotent migrations)
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpuscheduler -d gpuscheduler"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - gpunet

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gpunet

  api-gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: api-gateway
    image: gpu-cluster-scheduler/api-gateway:latest
    restart: unless-stopped
    environment:
      <<: *service-env
      HTTP_ADDR: ":8080"
      METRICS_ADDR: ":9090"
      SCHEDULER_ADDR: scheduler:50051
      OTEL_SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"   # REST
      - "9090:9090"   # /metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      scheduler:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gpunet

  scheduler:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: scheduler
    image: gpu-cluster-scheduler/scheduler:latest
    restart: unless-stopped
    environment:
      <<: *service-env
      GRPC_ADDR: ":50051"
      METRICS_ADDR: ":9091"
      NODE_AGENT_ADDRS: node-agent-1:50061,node-agent-2:50061
      OTEL_SERVICE_NAME: scheduler
    ports:
      - "50051:50051" # gRPC
      - "9091:9091"   # /metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9091/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gpunet

  node-agent-1:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: node-agent
    image: gpu-cluster-scheduler/node-agent:latest
    restart: unless-stopped
    environment:
      <<: *service-env
      NODE_ID: node-agent-1
      NODE_HOSTNAME: gpu-a100-01
      NODE_GPU_CAPACITY: "8"
      NODE_CPU_CAPACITY: "128"
      NODE_MEMORY_CAPACITY: "1024"
      NODE_GPU_MODEL: A100-80GB
      NODE_COST_PER_HOUR: "32.77"
      GRPC_ADDR: ":50061"
      METRICS_ADDR: ":9092"
      SCHEDULER_ADDR: scheduler:50051
      OTEL_SERVICE_NAME: node-agent
    ports:
      - "50061:50061"
      - "9092:9092"
    depends_on:
      redis:
        condition: service_healthy
      scheduler:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9092/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gpunet

  node-agent-2:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: node-agent
    image: gpu-cluster-scheduler/node-agent:latest
    restart: unless-stopped
    environment:
      <<: *service-env
      NODE_ID: node-agent-2
      NODE_HOSTNAME: gpu-l4-spot-02
      NODE_GPU_CAPACITY: "4"
      NODE_CPU_CAPACITY: "48"
      NODE_MEMORY_CAPACITY: "384"
      NODE_GPU_MODEL: L4-24GB
      NODE_COST_PER_HOUR: "4.35"
      NODE_SPOT: "true"
      GRPC_ADDR: ":50061"
      METRICS_ADDR: ":9092"
      SCHEDULER_ADDR: scheduler:50051
      OTEL_SERVICE_NAME: node-agent
    ports:
      - "50062:50061"
      - "9192:9092"
    depends_on:
      redis:
        condition: service_healthy
      scheduler:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9092/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gpunet

  metrics:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
      args:
        SERVICE: metrics
    image: gpu-cluster-scheduler/metrics:latest
    restart: unless-stopped
    environment:
      <<: *service-env
      METRICS_ADDR: ":9093"
      SCRAPE_TARGETS: scheduler:9091,node-agent-1:9092,node-agent-2:9092,api-gateway:9090
      OTEL_SERVICE_NAME: metrics
    ports:
      - "9093:9093"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - gpunet

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    restart: unless-stopped
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (collector's own metrics passthrough)
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - gpunet

  jaeger:
    image: jaegertracing/all-in-one:1.57
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
    networks:
      - gpunet

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9099:9090"   # Prometheus UI (9090 in-container; host 9099 to avoid api-gateway metrics clash)
    depends_on:
      - scheduler
      - node-agent-1
      - node-agent-2
      - metrics
      - api-gateway
    networks:
      - gpunet

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "3001:3000"   # Grafana UI (host 3001 to avoid clash with Next.js dev :3000)
    depends_on:
      - prometheus
    networks:
      - gpunet

  frontend:
    build:
      context: ./web
      dockerfile: ../deploy/docker/Dockerfile.frontend
    image: gpu-cluster-scheduler/frontend:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    networks:
      - gpunet

volumes:
  pgdata:
  redisdata:
  promdata:
  grafanadata:

networks:
  gpunet:
    driver: bridge
