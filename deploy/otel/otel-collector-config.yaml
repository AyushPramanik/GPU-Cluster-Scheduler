# OpenTelemetry Collector configuration for the GPU Cluster Scheduler.
# Receives OTLP from the Go services, exports traces to Jaeger + debug log,
# and exposes app metrics for Prometheus to scrape on :8889.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25
  resource:
    attributes:
      - key: cluster
        value: gpu-cluster-scheduler
        action: upsert

exporters:
  # Console output for local debugging of spans/metrics.
  debug:
    verbosity: normal

  # Traces -> Jaeger (OTLP gRPC endpoint of the all-in-one image).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Metrics -> Prometheus pull endpoint (scraped at otel-collector:8889).
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: gpuscheduler
    send_timestamps: true
    resource_to_telemetry_conversion:
      enabled: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp/jaeger, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]
  telemetry:
    logs:
      level: info
    metrics:
      address: 0.0.0.0:8888
