apiVersion: v1
kind: Service
metadata:
  name: metrics
  namespace: gpu-scheduler
  labels:
    app: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9093"
    prometheus.io/path: /metrics
spec:
  selector:
    app: metrics
  ports:
    - name: metrics
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics
  namespace: gpu-scheduler
  labels:
    app: metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics
  template:
    metadata:
      labels:
        app: metrics
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: metrics
          image: gpu-cluster-scheduler/metrics:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9093
          envFrom:
            - configMapRef:
                name: gpu-scheduler-config
            - secretRef:
                name: gpu-scheduler-db
          env:
            - name: METRICS_ADDR
              value: ":9093"
            - name: SCRAPE_TARGETS
              value: scheduler:9091,node-agent:9092,api-gateway:9090
            - name: OTEL_SERVICE_NAME
              value: metrics
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9093
            initialDelaySeconds: 15
            periodSeconds: 20
