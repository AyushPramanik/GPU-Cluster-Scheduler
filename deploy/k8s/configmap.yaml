apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-scheduler-config
  namespace: gpu-scheduler
  labels:
    app.kubernetes.io/part-of: gpu-cluster-scheduler
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: gpuscheduler
  DB_SSLMODE: disable
  REDIS_ADDR: redis:6379
  SCHEDULER_ADDR: scheduler:50051
  # In-cluster the metrics aggregator can discover node-agents via the headless svc.
  NODE_AGENT_ADDRS: node-agent:50061
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
