apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gpu-scheduler

commonLabels:
  app.kubernetes.io/part-of: gpu-cluster-scheduler

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - postgres.yaml
  - redis.yaml
  - api-gateway.yaml
  - scheduler.yaml
  - metrics.yaml
  - node-agent.yaml
  - frontend.yaml
  - ingress.yaml
  # ServiceMonitors require the Prometheus Operator CRDs. Comment out if absent.
  - servicemonitor.yaml

images:
  - name: gpu-cluster-scheduler/api-gateway
    newTag: latest
  - name: gpu-cluster-scheduler/scheduler
    newTag: latest
  - name: gpu-cluster-scheduler/node-agent
    newTag: latest
  - name: gpu-cluster-scheduler/metrics
    newTag: latest
  - name: gpu-cluster-scheduler/frontend
    newTag: latest
