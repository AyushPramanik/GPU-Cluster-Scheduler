# Database + cache credentials. In production, generate these with a sealed-secret
# controller / external-secrets operator instead of committing stringData.
apiVersion: v1
kind: Secret
metadata:
  name: gpu-scheduler-db
  namespace: gpu-scheduler
  labels:
    app.kubernetes.io/part-of: gpu-cluster-scheduler
type: Opaque
stringData:
  POSTGRES_DB: gpuscheduler
  POSTGRES_USER: gpuscheduler
  POSTGRES_PASSWORD: gpuscheduler
  # Full DSN consumed by the Go services.
  DATABASE_URL: postgres://gpuscheduler:gpuscheduler@postgres:5432/gpuscheduler?sslmode=disable
  REDIS_URL: redis://redis:6379/0
