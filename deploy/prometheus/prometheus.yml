# Prometheus scrape config for the GPU Cluster Scheduler.
# Targets use docker-compose service DNS names + in-container metrics ports.

global:
  scrape_interval: 5s
  scrape_timeout: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: gpu-cluster-scheduler
    env: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:9090"]
        labels:
          service: api-gateway

  - job_name: scheduler
    metrics_path: /metrics
    static_configs:
      - targets: ["scheduler:9091"]
        labels:
          service: scheduler

  - job_name: node-agent
    metrics_path: /metrics
    static_configs:
      - targets:
          - "node-agent-1:9092"
          - "node-agent-2:9092"
        labels:
          service: node-agent

  - job_name: metrics-aggregator
    metrics_path: /metrics
    static_configs:
      - targets: ["metrics:9093"]
        labels:
          service: metrics

  # OpenTelemetry Collector's Prometheus exporter (app-emitted OTEL metrics).
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: otel-collector
